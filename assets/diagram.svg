<svg viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3460"/>
      <stop offset="100%" stop-color="#061a35"/>
    </linearGradient>
    <linearGradient id="landGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d4a22"/>
      <stop offset="100%" stop-color="#1a2e14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4fc3f7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ff8f00"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#69f0ae"/>
    </marker>
    <clipPath id="clipSea">
      <rect x="180" y="260" width="960" height="200"/>
    </clipPath>
  </defs>

  <!-- Sky background -->
  <rect width="960" height="420" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="120" cy="60" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="200" cy="20" r="1" fill="white" opacity="0.7"/>
  <circle cx="350" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="480" cy="15" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="600" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="750" cy="25" r="1" fill="white" opacity="0.6"/>
  <circle cx="870" cy="10" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="920" cy="55" r="1" fill="white" opacity="0.7"/>

  <!-- Curved Earth surface (ocean) - gentle arc -->
  <path d="M 180,310 Q 570,275 960,320 L 960,420 L 180,420 Z" fill="url(#seaGrad)"/>

  <!-- Ocean wave details -->
  <path d="M 200,308 Q 300,302 400,307 Q 500,312 600,305 Q 700,298 800,308 Q 880,315 960,310" 
        fill="none" stroke="#1e5f8a" stroke-width="1.5" opacity="0.6"/>
  <path d="M 200,320 Q 350,314 500,320 Q 650,326 800,318 Q 880,314 960,322" 
        fill="none" stroke="#1e5f8a" stroke-width="1" opacity="0.4"/>

  <!-- Land / coast at left -->
  <path d="M 0,285 Q 80,270 180,310 L 180,420 L 0,420 Z" fill="url(#landGrad)"/>
  <path d="M 0,285 Q 80,270 180,310" fill="none" stroke="#4a7c3f" stroke-width="2"/>

  <!-- Observer person on coast -->
  <!-- Body -->
  <line x1="100" y1="265" x2="100" y2="295" stroke="#f5deb3" stroke-width="3"/>
  <!-- Head -->
  <circle cx="100" cy="258" r="9" fill="#f5deb3" stroke="#c8a97a" stroke-width="1.5"/>
  <!-- Arms -->
  <line x1="100" y1="272" x2="82" y2="280" stroke="#f5deb3" stroke-width="2.5"/>
  <line x1="100" y1="272" x2="118" y2="268" stroke="#f5deb3" stroke-width="2.5"/>
  <!-- Legs -->
  <line x1="100" y1="295" x2="90" y2="313" stroke="#f5deb3" stroke-width="2.5"/>
  <line x1="100" y1="295" x2="110" y2="313" stroke="#f5deb3" stroke-width="2.5"/>

  <!-- H_obs arrow -->
  <line x1="135" y1="249" x2="135" y2="313" stroke="#69f0ae" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <line x1="125" y1="249" x2="145" y2="249" stroke="#69f0ae" stroke-width="1.5"/>
  <line x1="125" y1="313" x2="145" y2="313" stroke="#69f0ae" stroke-width="1.5"/>
  <text x="148" y="285" fill="#69f0ae" font-size="13" font-weight="bold" filter="url(#glow)">H_obs</text>

  <!-- Turbine far offshore -->
  <!-- Mast (partial - base hidden) -->
  <line x1="780" y1="295" x2="780" y2="145" stroke="#b0bec5" stroke-width="5"/>

  <!-- Hidden part indication (dashed, below water) -->
  <line x1="780" y1="295" x2="780" y2="335" stroke="#546e7a" stroke-width="4" stroke-dasharray="6,5" opacity="0.7"/>

  <!-- Nacelle -->
  <rect x="767" y="138" width="26" height="12" rx="3" fill="#90a4ae"/>

  <!-- Blades -->
  <line x1="780" y1="140" x2="780" y2="60" stroke="#b0bec5" stroke-width="4"/>
  <line x1="780" y1="140" x2="710" y2="185" stroke="#b0bec5" stroke-width="4"/>
  <line x1="780" y1="140" x2="850" y2="185" stroke="#b0bec5" stroke-width="4"/>

  <!-- Blade tips glow -->
  <circle cx="780" cy="60" r="4" fill="#4fc3f7" filter="url(#glow)"/>
  <circle cx="710" cy="185" r="3" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="850" cy="185" r="3" fill="#4fc3f7" opacity="0.6"/>

  <!-- H_turb arrow -->
  <line x1="870" y1="60" x2="870" y2="295" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <line x1="860" y1="60" x2="880" y2="60" stroke="#4fc3f7" stroke-width="1.5"/>
  <line x1="860" y1="295" x2="880" y2="295" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="884" y="182" fill="#4fc3f7" font-size="13" font-weight="bold" filter="url(#glow)">H_turb</text>

  <!-- h (hidden height) arrow -->
  <line x1="820" y1="295" x2="820" y2="335" stroke="#ff8f00" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="810" y1="295" x2="830" y2="295" stroke="#ff8f00" stroke-width="1.5"/>
  <line x1="810" y1="335" x2="830" y2="335" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="833" y="320" fill="#ff8f00" font-size="13" font-weight="bold" filter="url(#glow)">h</text>
  <text x="845" y="320" fill="#ff8f00" font-size="11" opacity="0.85">(oculta)</text>

  <!-- Refraction line: curved from observer eye to blade tip -->
  <path d="M 109,250 Q 420,195 780,65" 
        fill="none" stroke="#ffd54f" stroke-width="2" stroke-dasharray="8,4" 
        marker-end="url(#arrowBlue)" opacity="0.9" filter="url(#softglow)"/>

  <!-- Refraction label -->
  <text x="370" y="188" fill="#ffd54f" font-size="11.5" font-style="italic" transform="rotate(-8,370,188)">Refração Atmosférica</text>

  <!-- Horizon line indicator -->
  <line x1="180" y1="310" x2="680" y2="287" stroke="#78909c" stroke-width="1" stroke-dasharray="12,6" opacity="0.5"/>

  <!-- Horizon label -->
  <text x="390" y="300" fill="#78909c" font-size="11" opacity="0.8">linha do horizonte</text>

  <!-- D_max distance arrow at bottom -->
  <line x1="100" y1="370" x2="780" y2="370" stroke="#ce93d8" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.9"/>
  <line x1="100" y1="360" x2="100" y2="380" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="390" y="363" fill="#ce93d8" font-size="13" text-anchor="middle" font-weight="bold">D_max</text>
  <text x="390" y="378" fill="#ce93d8" font-size="10" text-anchor="middle" opacity="0.75">(distância máxima de visibilidade)</text>

  <!-- Title watermark -->
  <text x="480" y="408" fill="#ffffff" font-size="10.5" text-anchor="middle" opacity="0.3" letter-spacing="2">VISIBILIDADE OFFSHORE · CURVATURA TERRESTRE + REFRAÇÃO ATMOSFÉRICA</text>
</svg>
